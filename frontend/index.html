<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Product Price Tracker — scrape and compare prices from VijaySales, GSMArena, and more. Powered by Supabase." />
  <title>Product Price Tracker — SCRAPYv1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #111827;
      --bg-input: #0d1224;
      --border: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #10b981;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --glow: rgba(99, 102, 241, 0.15);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }

    /* Header */
    .header { text-align: center; margin-bottom: 32px; }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p { color: var(--text-secondary); font-size: 14px; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .badge.live { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .badge.offline { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .badge.checking { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 4px 24px var(--glow);
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    /* Form */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    textarea { min-height: 70px; resize: vertical; }
    select option { background: var(--bg-card); }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary { background: var(--accent); color: white; }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .status.success { border-color: rgba(16, 185, 129, 0.4); color: #34d399; }
    .status.error { border-color: rgba(239, 68, 68, 0.4); color: #f87171; }
    .status.running { border-color: rgba(99, 102, 241, 0.4); color: #a5b4fc; }

    /* Links */
    .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      background: var(--bg-input);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .link-btn:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
      transform: translateY(-1px);
    }

    .note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @media (max-width: 600px) {
      .grid, .links { grid-template-columns: 1fr; }
      .container { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <span class="badge checking" id="apiBadge">⟳ Checking API...</span>
      <h1>Product Price Tracker</h1>
      <p>Scrape prices from VijaySales, GSMArena &amp; more — stored in Supabase</p>
    </div>

    <!-- Scraper Card -->
    <div class="card">
      <h2>🌐 API Backend URL</h2>
      <div class="grid" style="margin-bottom: 20px;">
        <div class="full">
          <input id="apiUrl" type="url" placeholder="https://your-backend-app.koyeb.app" value="http://localhost:8000" onchange="checkApi()" />
        </div>
      </div>

      <h2>⚡ Run Scraper</h2>

      <div class="grid">
        <div>
          <label for="site">Site</label>
          <select id="site" onchange="toggleGsmaUrl()">
            <option value="vijaysales">VijaySales</option>
            <option value="webscraper">Webscraper Test Site</option>
            <option value="gsmarena">GSMArena</option>
          </select>
        </div>

        <div>
          <label for="pages">Pages</label>
          <input id="pages" type="number" min="1" max="10" value="2" />
        </div>

        <div class="full">
          <label for="keywords">Keywords (comma separated)</label>
          <textarea id="keywords" placeholder="iphone, samsung s24, oneplus"></textarea>
        </div>

        <div class="full" id="gsmarenaUrlWrap" style="display:none;">
          <label for="gsmarenaUrl">GSMArena URL</label>
          <input id="gsmarenaUrl" type="text" value="https://www.gsmarena.com/samsung-phones-9.php" />
        </div>

        <div class="full">
          <button class="btn btn-primary" id="scrapeBtn" onclick="runScraper()">
            Run Scraper
          </button>
        </div>
      </div>

      <div id="status" class="status">Waiting for input...</div>
      <div class="note">Enter your Koyeb or external backend URL above.</div>
    </div>

    <!-- Links Card -->
    <div class="card">
      <h2>🔗 Quick Links</h2>
      <div class="links">
        <a class="link-btn" href="#" onclick="window.open(document.getElementById('apiUrl').value, '_blank'); return false;">
          <span>📡</span> API Health
        </a>
        <a class="link-btn" href="#" onclick="window.open(document.getElementById('apiUrl').value + '/docs', '_blank'); return false;">
          <span>📄</span> API Docs
        </a>
        <a class="link-btn" href="https://supabase.com/dashboard" target="_blank">
          <span>🗄️</span> Supabase Console
        </a>
        <a class="link-btn" href="https://github.com/5uhaeb/SCRAPYv1" target="_blank">
          <span>🐙</span> GitHub Repo
        </a>
      </div>
    </div>
  </div>

  <script>
    // ─── GSMArena URL toggle ───
    function toggleGsmaUrl() {
      const site = document.getElementById("site").value;
      document.getElementById("gsmarenaUrlWrap").style.display =
        site === "gsmarena" ? "block" : "none";
    }

    // ─── API Health Check ───
    async function checkApi() {
      const badge = document.getElementById("apiBadge");
      const apiUrl = document.getElementById("apiUrl").value.replace(/\/$/, "");
      badge.className = "badge checking";
      badge.textContent = "⟳ Checking API...";
      
      try {
        const res = await fetch(`${apiUrl}/`, { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          badge.className = "badge live";
          badge.textContent = "● API Connected";
        } else {
          throw new Error("Not OK");
        }
      } catch {
        badge.className = "badge offline";
        badge.textContent = "○ API Offline";
      }
    }

    // ─── Run Scraper ───
    async function runScraper() {
      const site = document.getElementById("site").value;
      const keywordsRaw = document.getElementById("keywords").value;
      const pages = parseInt(document.getElementById("pages").value || "2", 10);
      const gsmarenaUrl = document.getElementById("gsmarenaUrl").value.trim();
      const status = document.getElementById("status");
      const btn = document.getElementById("scrapeBtn");

      const keywords = keywordsRaw.split(",").map(k => k.trim()).filter(Boolean);

      if (!keywords.length) {
        status.textContent = "Please enter at least one keyword.";
        status.className = "status error";
        return;
      }

      const payload = { site, keywords, pages };
      if (site === "gsmarena") payload.url = gsmarenaUrl;

      // Running state
      status.innerHTML = '<span class="spinner"></span>&nbsp; Scraping — this may take a few seconds...';
      status.className = "status running";
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Scraping...';

      try {
        const baseUrl = document.getElementById("apiUrl").value.replace(/\/$/, "");
        const res = await fetch(`${baseUrl}/scrape`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          status.textContent = "✗ " + (data.detail || data.error || "Scraper failed.");
          status.className = "status error";
        } else {
          status.textContent = "✓ " + (data.message || "Scraper finished successfully.");
          status.className = "status success";
        }
      } catch (err) {
        status.textContent = "✗ Request failed. The function may have timed out — try fewer keywords.";
        status.className = "status error";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Run Scraper";
      }
    }

    // ─── Init ───
    toggleGsmaUrl();
    checkApi();
  </script>
</body>
</html>
